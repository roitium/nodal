"$schema" = "node_modules/wrangler/config-schema.json"
name = "backend-hono"
main = "src/index.ts"
compatibility_date = "2026-03-14"
compatibility_flags = ["nodejs_compat"]

# Keep workers.dev enabled for now.
# When you bind a production custom domain, switch this to false.
# workers_dev = false

# Production custom domain example:
# routes = [
#   { pattern = "nodal.roitium.com", custom_domain = true },
# ]

# [vars]
# MY_VAR = "my-variable"

# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# [[d1_databases]]
# binding = "MY_DB"
# database_name = "my-database"
# database_id = ""

# [ai]
# binding = "AI"

# [observability]
# enabled = true
# head_sampling_rate = 1
