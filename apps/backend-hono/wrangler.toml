"$schema" = "node_modules/wrangler/config-schema.json"
name = "backend-hono"
main = "src/index.ts"
compatibility_date = "2026-03-14"
compatibility_flags = ["nodejs_compat"]

# Production traffic goes through the custom domain below.
workers_dev = false
routes = [{ pattern = "nodal.roitium.com", custom_domain = true }]

# Keep secrets in .dev.vars locally and in Wrangler secrets remotely.

# [vars]
# MY_VAR = "my-variable"

# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# [[d1_databases]]
# binding = "MY_DB"
# database_name = "my-database"
# database_id = ""

# [ai]
# binding = "AI"

# [observability]
# enabled = true
# head_sampling_rate = 1
