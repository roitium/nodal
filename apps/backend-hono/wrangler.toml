name = "nodal-backend-v2"
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = false

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "v2.be.nodal.roitium.com"
custom_domain = true

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "nodal-resources"
